site_name: Pireal
site_description: Un intérprete de Álgebra Relacional para aprender bases de datos
repo_url: https://github.com/centaurialpha/pireal
repo_name: centaurialpha/pireal
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2015-2026 Gabriel Acosta

extra:
  version: "4.0.0"

theme:
  name: material
  custom_dir: overrides
  logo: images/pireal_icon.png
  favicon: images/pireal_icon.ico
  palette:
      scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/home.css
  - stylesheets/custom.css

nav:
  - Inicio: index.md
  - Primeros pasos: getting-started.md
  - Álgebra Relacional:
      - Operadores: relational-algebra/operators.md
      - Ejemplos: relational-algebra/examples.md
  - Guía de uso:
      - Bases de datos: user-guide/databases.md
      - Consultas: user-guide/queries.md
  - Cómo funciona:
      - El intérprete: internals/interpreter.md
      - Crear temas: internals/themes.md
  - Contribuir: contributing.md

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: es
          default: true
          name: Español
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Inicio: Home
            Primeros pasos: Getting Started
            Álgebra Relacional: Relational Algebra
            Operadores: Operators
            Ejemplos: Examples
            Guía de uso: User Guide
            Bases de datos: Databases
            Consultas: Queries
            Cómo funciona: Under the Hood
            El intérprete: The Interpreter
            Crear temas: Creating Themes
            Contribuir: Contributing

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - tables
