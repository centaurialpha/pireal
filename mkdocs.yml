site_name: Pireal
site_description: Un intérprete de Álgebra Relacional para aprender bases de datos
repo_url: https://github.com/centaurialpha/pireal
repo_name: centaurialpha/pireal
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2015-2026 Gabriel Acosta

extra:
  version: "4.0.0"

theme:
  name: material
  custom_dir: overrides
  logo: images/pireal_icon.png
  favicon: images/pireal_icon.ico
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/home.css
  - stylesheets/custom.css

nav:
  - Inicio: index.md
  - Primeros pasos: getting-started.md
  - Álgebra Relacional:
      - Operadores: relational-algebra/operators.md
      - Ejemplos: relational-algebra/examples.md
  - Guía de uso:
      - Bases de datos: user-guide/databases.md
      - Consultas: user-guide/queries.md
  - Cómo funciona:
      - El intérprete: internals/interpreter.md
      - Crear temas: internals/themes.md
  - Contribuir: contributing.md

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Getting Started: Primeros pasos
            Relational Algebra: Álgebra Relacional
            Operators: Operadores
            Examples: Ejemplos
            User Guide: Guía de uso
            Databases: Bases de datos
            Queries: Consultas
            Under the Hood: Cómo funciona
            The Interpreter: El intérprete
            Creating Themes: Crear temas
            Contributing: Contribuir

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - tables
